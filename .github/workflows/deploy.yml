name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  # ─────────────────────────────────────────────
  # 1. GitHub sunucusunda Docker image build et
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 2. Coolify webhook'u tetikle → sadece docker pull yapar
  # ─────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify redeploy
        run: |
          WEBHOOK=$(echo "${{ secrets.COOLIFY_WEBHOOK }}" | tr -d '[:space:]')
          TOKEN=$(echo "${{ secrets.COOLIFY_TOKEN }}" | tr -d '[:space:]')
          curl -v --insecure \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}"
